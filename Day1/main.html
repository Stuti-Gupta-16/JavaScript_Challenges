<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drum Beat Mini Project</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background">
        <div class="blocks">
            <div class="box"  data-key="65"> 
                <div class="clap">
                    <h2>A</h2>
                    <h3>Clap</h3>
                </div> </div>
            <div class="box" data-key="83"> 
                <div class="hihat"  >
                    <h2>S</h2>
                    <h3>Hi-Hat</h3>
                </div> </div>
            <div class="box" data-key="68"> 
                <div class="kick">
                    <h2>D</h2>
                    <h3>Kick</h3>
                </div>
            </div>
            <div class="box" data-key="70"> 
                <div class="openhat">
                    <h2>F</h2>
                    <h3>Open-Hat</h3>
                </div>
            </div>
            <div class="box"  data-key="71">
                 <div class="boom">
                    <h2>G</h2>
                    <h3>Boom</h3>
                </div>
            </div>
            <div class="box" data-key="72"> 
                <div class="ride">
                    <h2>H</h2>
                    <h3>Ride</h3>
                </div>
            </div>
            <div class="box" data-key="74">
                <div class="snare">
                    <h2>J</h2>
                    <h3>Snare</h3>
                </div>
            </div>
            <div class="box" data-key="75">
                <div class="tom">
                    <h2>K</h2>
                    <h3>Tom</h3>
                </div>
            </div>
            <div class="box" data-key="76">
                <div class="tink">
                    <h2>L</h2>
                    <h3>Tink</h3>
                </div>
            </div>
        </div>
    </div>
    <audio data-key="65" src="sounds/clap.mp3"></audio>
    <audio data-key="83" src="sounds/hi_hak.mp3"></audio>
    <audio data-key="68" src="sounds/kick.mp3"></audio>
    <audio data-key="70" src="sounds/open_hat.mp3"></audio>
    <audio data-key="71" src="sounds/boom.mp3"></audio>
    <audio data-key="72" src="sounds/ride.mp3"></audio>
    <audio data-key="74" src="sounds/snare.mp3"></audio>
    <audio data-key="75" src="sounds/tom.mp3"></audio>
    <audio data-key="76" src="sounds/tink.mp3"></audio>
    <script src="app.js"></script>
</body>
</html>
